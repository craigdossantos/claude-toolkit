<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <meta name="description" content="{{PAGE_DESCRIPTION}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─────────── Reset / base ─────────── */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 72px;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #fafaf7;
        color: #1e293b;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* ─────────── Sticky nav ─────────── */
      .site-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(15, 23, 42, 0.96);
        backdrop-filter: saturate(180%) blur(12px);
        -webkit-backdrop-filter: saturate(180%) blur(12px);
        color: #f8fafc;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.05),
          0 4px 20px rgba(15, 23, 42, 0.08);
      }
      .site-nav .brand {
        font-family: "Fraunces", serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .site-nav .brand .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #fbbf24;
        border-radius: 50%;
        margin-right: 8px;
        vertical-align: middle;
      }
      .site-nav .sep {
        flex: 1;
      }
      .site-nav a.jump {
        color: #cbd5e1;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 6px;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .site-nav a.jump:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
      }

      /* ─────────── Hero / intro ─────────── */
      .hero {
        max-width: 900px;
        margin: 0 auto;
        padding: 72px 28px 40px;
        text-align: left;
      }
      .hero .eyebrow {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #64748b;
        margin-bottom: 14px;
      }
      .hero h1 {
        font-family: "Fraunces", serif;
        font-size: clamp(40px, 6vw, 64px);
        font-weight: 600;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: #0f172a;
        margin-bottom: 18px;
      }
      .hero h1 em {
        font-style: italic;
        color: #475569;
        font-weight: 500;
      }
      .hero .lede {
        font-size: 18px;
        color: #475569;
        max-width: 680px;
        line-height: 1.55;
      }
      .hero .meta {
        margin-top: 24px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 13px;
        color: #64748b;
      }
      .hero .meta span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .hero .meta .count-num {
        font-weight: 700;
        color: #0f172a;
        font-variant-numeric: tabular-nums;
      }

      /* ─────────── Table of contents ─────────── */
      .toc {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px 28px 56px;
      }
      .toc h2 {
        font-family: "Fraunces", serif;
        font-size: 24px;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e2e8f0;
        letter-spacing: -0.01em;
      }
      .toc-group {
        margin-bottom: 28px;
      }
      .toc-group-label {
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #64748b;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .toc-group-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e2e8f0;
      }
      .toc-items {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 8px;
      }
      .toc-item {
        display: block;
        padding: 12px 14px;
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
        border: 1px solid transparent;
        transition: all 0.15s;
      }
      .toc-item:hover {
        background: #fff;
        border-color: #e2e8f0;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      }
      .toc-item-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
      }
      .toc-item-name {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 13px;
        font-weight: 600;
        color: #0f172a;
      }
      .toc-item-tag {
        font-size: 13px;
        color: #64748b;
        line-height: 1.4;
      }

      /* ─────────── Source badges ─────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 3px;
        white-space: nowrap;
      }
      .badge.custom {
        background: #dcfce7;
        color: #15803d;
      }
      .badge.plugin {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .badge.custom::before {
        content: "●";
        font-size: 8px;
      }
      .badge.plugin::before {
        content: "◆";
        font-size: 8px;
      }

      /* ─────────── Source link (opt-in via --base-repo or frontmatter repo:) ─────────── */
      .source-link {
        font-size: 12px;
        font-weight: 500;
        color: #64748b;
        text-decoration: none;
        padding: 3px 10px;
        border: 1px solid #e2e8f0;
        border-radius: 999px;
        transition: all 0.15s;
        white-space: nowrap;
        margin-left: auto;
      }
      .source-link:hover {
        color: #0f172a;
        border-color: #94a3b8;
        background: #f8fafc;
      }
      .toc-source {
        margin-left: auto;
      }
      .toc-source a {
        font-size: 10px;
        font-weight: 600;
        color: #64748b;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .toc-source a:hover {
        color: #2563eb;
      }

      /* ─────────── Skill sections ─────────── */
      .skill-sections {
        max-width: 1040px;
        margin: 0 auto;
        padding: 0 28px 100px;
      }
      .skill-section {
        padding: 56px 0;
        border-top: 1px solid #e2e8f0;
      }
      .skill-section:first-child {
        border-top: none;
      }
      .skill-section .section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .skill-section h2 {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 28px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .skill-section .tagline {
        font-size: 17px;
        color: #475569;
        font-style: italic;
        margin-bottom: 24px;
        border-left: 3px solid #fbbf24;
        padding-left: 14px;
      }
      .skill-section .hero-img-wrap {
        margin: 20px 0 28px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        background: #fff;
      }
      .skill-section .hero-img-wrap img {
        display: block;
        width: 100%;
        height: auto;
      }
      .skill-section .no-readme {
        background: #fffbeb;
        border: 1px solid #fde68a;
        color: #92400e;
        padding: 14px 18px;
        border-radius: 8px;
        font-size: 14px;
      }

      /* ─────────── Rendered README content ─────────── */
      .readme {
        color: #334155;
      }
      .readme > :first-child {
        margin-top: 0;
      }
      .readme h2 {
        font-family: "Inter", sans-serif;
        font-size: 20px;
        font-weight: 600;
        color: #0f172a;
        margin: 28px 0 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid #e2e8f0;
      }
      .readme h3 {
        font-family: "Inter", sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: #0f172a;
        margin: 20px 0 8px;
      }
      .readme p {
        margin: 10px 0;
        font-size: 15px;
        line-height: 1.65;
      }
      .readme ul,
      .readme ol {
        margin: 10px 0 14px 24px;
      }
      .readme li {
        font-size: 15px;
        line-height: 1.65;
        margin: 4px 0;
      }
      .readme code {
        background: #f1f5f9;
        color: #0f172a;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 13px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .readme pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 16px 18px;
        border-radius: 10px;
        overflow-x: auto;
        margin: 14px 0 16px;
        font-size: 13px;
        line-height: 1.6;
      }
      .readme pre code {
        background: transparent;
        color: inherit;
        padding: 0;
        font-size: inherit;
      }
      .readme a {
        color: #2563eb;
        text-decoration: none;
        border-bottom: 1px solid rgba(37, 99, 235, 0.3);
      }
      .readme a:hover {
        border-bottom-color: #2563eb;
      }
      .readme img {
        max-width: 100%;
        border-radius: 8px;
        margin: 12px 0 16px;
        display: block;
        box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
      }
      .readme table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0 18px;
        font-size: 14px;
      }
      .readme th {
        background: #f1f5f9;
        color: #0f172a;
        font-weight: 600;
        text-align: left;
        padding: 9px 13px;
        border: 1px solid #e2e8f0;
      }
      .readme td {
        padding: 9px 13px;
        border: 1px solid #e2e8f0;
        color: #334155;
        vertical-align: top;
      }
      .readme blockquote {
        border-left: 3px solid #2563eb;
        padding: 4px 0 4px 16px;
        margin: 12px 0;
        color: #475569;
        font-style: italic;
        font-size: 16px;
      }
      .readme hr {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 24px 0;
      }

      /* ─────────── Back to top ─────────── */
      .back-to-top {
        display: inline-block;
        margin-top: 32px;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 500;
        color: #64748b;
        text-decoration: none;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        transition: all 0.15s;
      }
      .back-to-top:hover {
        color: #0f172a;
        border-color: #cbd5e1;
        background: #fff;
      }

      /* ─────────── Footer ─────────── */
      .site-footer {
        max-width: 1040px;
        margin: 0 auto;
        padding: 40px 28px 80px;
        border-top: 1px solid #e2e8f0;
        font-size: 13px;
        color: #64748b;
        text-align: center;
      }
      .site-footer .generated {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 6px;
      }

      /* ─────────── Responsive ─────────── */
      @media (max-width: 720px) {
        .site-nav {
          padding: 12px 16px;
          gap: 8px;
          flex-wrap: wrap;
        }
        .site-nav a.jump {
          display: none;
        }
        .hero {
          padding: 48px 20px 28px;
        }
        .hero h1 {
          font-size: 36px;
        }
        .toc,
        .skill-sections,
        .site-footer {
          padding-left: 20px;
          padding-right: 20px;
        }
        .toc-items {
          grid-template-columns: 1fr;
        }
        .skill-section h2 {
          font-size: 22px;
        }
        .skill-section {
          padding: 40px 0;
        }
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <span class="brand"><span class="dot"></span>{{PAGE_BRAND}}</span>
      <span class="sep"></span>
      {{NAV_LINKS}}
    </nav>

    <header class="hero">
      <div class="eyebrow">{{PAGE_EYEBROW}}</div>
      <h1>{{PAGE_HEADLINE}}</h1>
      <p class="lede">{{PAGE_LEDE}}</p>
      <div class="meta">
        <span><span class="count-num">{{TOTAL_COUNT}}</span> skills</span>
        <span><span class="count-num">{{CUSTOM_COUNT}}</span> custom</span>
        <span><span class="count-num">{{PLUGIN_COUNT}}</span> plugin</span>
      </div>
    </header>

    <section class="toc" id="toc">
      <h2>Table of contents</h2>
      {{TOC_GROUPS}}
    </section>

    <main class="skill-sections">{{SKILL_SECTIONS}}</main>

    <footer class="site-footer">
      <div>Built with the <code>skill-showcase</code> skill</div>
      <div class="generated">Generated {{GENERATED_DATE}}</div>
    </footer>
  </body>
</html>
